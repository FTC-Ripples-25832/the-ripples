name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source archive
        run: git archive --format=tar.gz --output=ripplesftc_deploy.tar.gz HEAD

      - name: Upload archive to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ripplesftc_deploy.tar.gz
          target: /tmp

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            source ~/.bashrc
            DEPLOY_DIR=/var/www/ripplesftc.com
            STAGING_DIR=/tmp/ripplesftc_deploy_src
            ARCHIVE=/tmp/ripplesftc_deploy.tar.gz

            mkdir -p "$DEPLOY_DIR" "$STAGING_DIR"
            rm -rf "$STAGING_DIR"/*
            tar -xzf "$ARCHIVE" -C "$STAGING_DIR"

            if [ -f "$DEPLOY_DIR/.env" ]; then
              cp "$DEPLOY_DIR/.env" "$STAGING_DIR/.env"
            fi

            pm2 stop ecosystem.config.js || true

            find "$DEPLOY_DIR" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
            cp -a "$STAGING_DIR"/. "$DEPLOY_DIR"/

            cd "$DEPLOY_DIR"
            pnpm install --frozen-lockfile
            pnpm build
            pm2 start ecosystem.config.js
            pm2 save

            rm -f "$ARCHIVE"
            rm -rf "$STAGING_DIR"
