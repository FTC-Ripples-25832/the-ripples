name: Deploy to Production Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This step now automatically reads the pnpm version from your package.json
      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory on the server
            cd ${{ secrets.PROJECT_PATH }}

            # Pull the latest code from the main branch
            git pull origin main

            # Install production dependencies using pnpm
            # The version of pnpm on your server will be used here
            pnpm install --prod

            # Build the Next.js application for production
            pnpm build

            # Restart the application using PM2 and the ecosystem file
            # 'reload' is a zero-downtime restart
            pm2 reload the-ripples

            # Save the PM2 process list to resurrect on server reboot
            pm2 save
