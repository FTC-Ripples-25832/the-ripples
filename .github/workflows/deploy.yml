name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        env:
          GH_REPO_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_REPO_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            source ~/.bashrc
            cd /var/www/ripplesftc.com
            git remote set-url origin https://github.com/FTC-Ripples-25832/the-ripples.git
            git -c http.extraheader="AUTHORIZATION: bearer ${GH_REPO_TOKEN}" fetch --prune origin main
            git checkout -B main FETCH_HEAD
            git reset --hard FETCH_HEAD
            git clean -fd
            pm2 stop ecosystem.config.js || true
            pnpm install
            pnpm build
            pm2 start ecosystem.config.js
            pm2 save
