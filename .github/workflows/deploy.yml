name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf "%s" "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          DEPLOY_DIR=/var/www/ripplesftc.com

          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".next" \
            --exclude "node_modules" \
            --exclude ".env" \
            --rsync-path="mkdir -p $DEPLOY_DIR && rsync" \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ "$SERVER_USER@$SERVER_HOST:$DEPLOY_DIR/"

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -eo pipefail
            export PATH="$HOME/.local/share/pnpm:$PATH"
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              # nvm init scripts often reference unset vars; avoid nounset during source
              set +u
              . "$HOME/.nvm/nvm.sh"
              set -u
            fi
            DEPLOY_DIR=/var/www/ripplesftc.com

            cd "$DEPLOY_DIR"
            pm2 stop ecosystem.config.js || true

            command -v pnpm >/dev/null
            command -v pm2 >/dev/null
            pnpm install --frozen-lockfile --prefer-offline
            pnpm build
            pm2 start ecosystem.config.js
            pm2 save
