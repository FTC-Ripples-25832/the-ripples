name: Deploy to Production Server

# This workflow runs on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Use pnpm version 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use Node.js version 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm build

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory
            cd ${{ secrets.PROJECT_PATH }}

            # Maintenance mode on (optional, good for preventing errors during deploy)
            # pm2 stop the-ripples || true

            # Pull the latest changes from the main branch
            git pull origin main

            # Install dependencies
            pnpm install --prod

            # The build is now done on the server to ensure correct architecture
            # pnpm build

            # Start or restart the application with PM2
            # This will use the ecosystem.config.js file
            pm2 startOrRestart ecosystem.config.js --env production

            # Optional: Save the PM2 process list to resurrect on server reboot
            pm2 save
